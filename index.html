<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Grade 10 Classmates</title>
</head>

<body class="bg-light">

<div class="container mt-5">
    
    <!-- Title -->
    <div class="text-center mb-4">
        <h2 class="fw-bold">📘 Grade 10 Classmates System</h2>
        <p class="text-muted">Add and view your classmates easily</p>
    </div>

    <!-- Card Form -->
    <div class="card shadow p-4">
        <div class="mb-3">
            <input type="text" id="classmate1" class="form-control" placeholder="Enter classmate name">
        </div>

        <div class="mb-3">
            <input type="text" id="section" class="form-control" placeholder="Enter section">
        </div>

        <div class="mb-3">
            <input type="text" id="subject" class="form-control" placeholder="Enter favorite subject">
        </div>

        <div class="d-flex gap-2">
            <input type="button" py-click="add_classmate" class="btn btn-primary w-50" value="Add Classmate">
            <input type="button" py-click="show_classmates" class="btn btn-success w-50" value="Show List">
        </div>
    </div>
    <div class="card shadow mt-4 p-3">
        <h5 class="fw-bold">📋 Classmate List</h5>
        <div id="output" class="mt-2"></div>
    </div>

</div>
<py-script src="main.py"></py-script>

</body>
</html>
